# 写作类 Prompt 配置
writing:
  #创意提炼
  extract_idea_prompt_base: |
    你是一名资深小说编辑, 请从用户提供的创意描述中提炼出清晰的小说构思要素。

    用户创意: 
    {user_idea}

    请理解用户想表达的故事情节方向, 并进行合理补全与归纳。

    提炼要求: 
    1. 剧情: 简短描绘故事的主要情节走向和核心冲突
    2. 类型: 选择最合适的小说类型（如玄幻、科幻、都市、悬疑等）
    3. 基调: 整体情绪（如热血、黑暗、轻松、搞笑等）
    4. 目标读者: 大致读者群体（如男频、女频、青少年等）
    5. 核心设想: 用1-2句话描述故事的核心设想

    如果用户描述不完整, 可以合理推断, 但要保持逻辑一致。
  extract_idea_prompt_with_schema_suffix: |
    请只提炼出故事构思要素, 不要输出任何额外内容。
  extract_idea_prompt_without_schema_suffix: |
    请严格输出 JSON, 不要输出任何额外内容: 
    {{
      "plot": "剧情概括",
      "genre": "类型",
      "tone": "基调",
      "target_audience": "目标读者",
      "core_idea": "核心设想"
    }}

  #故事核心
  core_seed_prompt_base: |
    作为专业作家, 请用“雪花写作法”第一步构建故事核心。

    剧情: {plot}
    类型: {genre}
    基调: {tone}
    目标读者: {target_audience}
    核心设想: {core_idea}
    篇幅: 约{number_of_chapters}章（每章{words_per_chapter}字）

    请用单句公式概括故事本质, 例如: 
    “当[主角]遭遇[核心事件], 必须[关键行动], 否则[灾难后果]；与此同时, [隐藏的更大危机]正在发酵。”

    要求: 
    1. 必须包含显性冲突与潜在危机
    2. 体现人物核心驱动力
    3. 暗示世界观关键矛盾
    4. 使用30-100字精准表达
  core_seed_prompt_with_schema_suffix: |
    请只生成故事核心内容。
  core_seed_prompt_without_schema_suffix: |
    请严格输出一个 JSON 对象, 不要输出任何额外内容: 
    {{"core_seed": "故事核心公式"}}

  #小说整体设定
  novel_meta_prompt_base: |
    你是一名专业小说策划人, 请基于以下信息构建小说的整体设定。

    基础信息: 
    剧情: {plot}
    类型: {genre}
    基调: {tone}
    目标读者: {target_audience}
    核心设想: {core_idea}
    篇幅: 约{number_of_chapters}章（每章{words_per_chapter}字）

    故事核心: 
    {core_seed}

    请在保持逻辑一致的前提下, 进行创造性扩展, 生成完整的小说基础信息。

    生成要求: 

    1. 标题: 
       - 具有吸引力和传播性
       - 符合该类型读者审美

    2. 副标题: 
       - 补充核心冲突或主题
       - 具有一定文学感或商业感

    3. 引言: 
       - 100-300字
       - 清晰呈现主线冲突 + 悬念

    4. 世界观: 
       - 说明世界规则 / 力量体系 / 社会结构
       - 不少于100字

    5. 创作风格: 
       - 如“偏黑暗现实”“轻快幽默”“史诗宏大”等

    6. 叙事视角: 
       - 如“第一人称 / 第三人称有限视角 / 全知视角”

    7. 时代背景: 
       - 如“架空古代 / 未来星际 / 现代都市 / 末世废土”等

    8. 标签: 
       - 3-5个, 概括小说核心元素, 如“硬科幻”“冒险”“爱情”等

    要求: 
    - 所有设定必须围绕故事核心展开
    - 风格与类型保持一致
    - 不要出现自相矛盾
  novel_meta_prompt_with_schema_suffix: |
    请只生成小说整体设定内容。
  novel_meta_prompt_without_schema_suffix: |
    请严格输出 JSON, 不要输出任何额外内容: 
    {{
      "title": "小说标题",
      "subtitle": "副标题",
      "introduction": "引言",
      "worldview": "世界观",
      "writing_style": "创作风格",
      "narrative_pov": "叙事视角",
      "era_background": "时代背景",
      "tags": ["标签1", "标签2", "标签3"]
    }}