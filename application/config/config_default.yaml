# Default configuration for the application
# You can override these settings by creating a config.yaml file in the same directory
# Do not edit this file directly, as it may be overwritten during updates
"mongodb_url": "mongodb://localhost:27017"
"mongo_database_name": "my_database"
"mongo_timeout_ms": 5000

# LLM 大模型配置
# 每个 provider 条目的 key 是用户自定义的别名，type 指定客户端类别（openai / gemini / claude）
# 同一个 type 可以定义多个不同别名的配置，方便在不同场景使用不同模型
llm:
  default_provider: openai_gpt4o_mini
  providers:
    openai_gpt4o_mini:
      type: openai
      base_url: "https://api.openai.com/v1"
      api_key: ""
      default_model: "gpt-4o-mini"
      enabled: false
      timeout_seconds: 60
      max_retries: 2
      max_concurrency: 5
      supports_streaming: true
      supports_json_schema: true
      supports_function_calling: true
    deepseek_chat:
      type: openai
      base_url: "https://api.deepseek.com/v1"
      api_key: ""
      default_model: "deepseek-chat"
      enabled: false
      timeout_seconds: 60
      max_retries: 2
      max_concurrency: 5
      supports_streaming: true
      supports_json_schema: true
      supports_function_calling: true
    gemini_flash:
      type: gemini
      base_url: ""
      api_key: ""
      default_model: "gemini-3.1-flash-lite-preview"
      enabled: false
      timeout_seconds: 60
      max_retries: 2
      max_concurrency: 5
      supports_streaming: true
      supports_json_schema: true
      supports_function_calling: true
    claude_sonnet:
      type: claude
      base_url: ""
      api_key: ""
      default_model: "claude-sonnet-4-20250514"
      enabled: false
      timeout_seconds: 60
      max_retries: 2
      max_concurrency: 5
      supports_streaming: true
      supports_json_schema: true
      supports_function_calling: true
  # 在这里定义不同的工作流，每个工作流指定默认使用哪个 provider，以及每个步骤使用哪个 provider
  workflows:
    create_novel_by_ai:
      default_provider: openai_gpt4o_mini
      steps:
        extract_idea:
          provider: openai_gpt4o_mini
        core_seed:
          provider: openai_gpt4o_mini
        novel_meta:
          provider: openai_gpt4o_mini